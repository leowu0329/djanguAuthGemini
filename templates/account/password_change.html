{% extends "base.html" %}
{% load i18n %}

{% block title %}修改密碼 - MyProject{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4">
                <h2 class="text-center fw-bold mb-4">修改您的密碼</h2>
                
                <form method="POST" action="{% url 'account_change_password' %}" class="password_change">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.help_text %}
                                <div class="form-text text-muted" style="font-size: 0.8rem;">{{ field.help_text }}</div>
                            {% endif %}
                            {{ field.errors }}
                        </div>
                    {% endfor %}
                    
                    <button class="btn btn-primary w-100 py-2 fw-bold mt-3" type="submit">確認更換密碼</button>
                </form>
                
                <div class="text-center mt-3">
                    <a href="{% url 'account_reset_password' %}" class="text-decoration-none text-muted small">忘記舊密碼了？</a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* 讓 Django 自動生成的 input 套用 Bootstrap 樣式 */
    .password_change input {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        background-clip: padding-box;
        border: 1px solid #ced4da;
        appearance: none;
        border-radius: 0.375rem;
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
    }
</style>
{% endblock %}
