{% load i18n %}{% load account %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘記密碼 - 系統首頁</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .reset-card { width: 100%; max-width: 400px; padding: 2.5rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
        .reset-card h2 { font-weight: 700; color: #333; margin-bottom: 1rem; text-align: center; }
        .reset-card p { color: #666; font-size: 0.9rem; text-align: center; margin-bottom: 1.5rem; }
        .reset-card input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem; margin-bottom: 1rem; }
        .btn-reset { width: 100%; padding: 0.75rem; font-weight: 700; border-radius: 0.5rem; background-color: #6c757d; border: none; color: white; transition: 0.3s; }
        .btn-reset:hover { background-color: #5a6268; }
    </style>
</head>
<body>
<div class="reset-card">
    <h2>找回密碼</h2>
    <p>請輸入您的 Email，我們將寄送重設連結給您。</p>
    <form method="POST" action="{% url 'account_reset_password' %}" class="password_reset">
        {% csrf_token %}
        {{ form.email }}
        {{ form.email.errors }}
        <button class="btn-reset" type="submit">發送重設郵件</button>
    </form>
    <div class="text-center mt-3">
        <a href="{% url 'account_login' %}" class="text-decoration-none">返回登入</a>
    </div>
</div>
</body>
</html>
