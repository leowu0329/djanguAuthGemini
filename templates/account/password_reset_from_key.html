{% load i18n %}{% load account %}
<div class="reset-card">
    <h2>設定新密碼</h2>
    {% if token_fail %}
        <p class="text-danger">抱歉，重設連結已失效或過期。</p>
        <a href="{% url 'account_reset_password' %}" class="btn btn-danger w-100">重新申請</a>
    {% else %}
        <form method="POST" action="{{ action_url }}">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}
            <button class="btn btn-primary w-100 py-2 fw-bold" type="submit">更新密碼</button>
        </form>
    {% endif %}
</div>
