{% extends "base.html" %}

{% block title %}首頁 - 歡迎來到 MyProject{% endblock %}

{% block content %}
<div class="p-5 mb-4 bg-light rounded-3 border">
    <div class="container-fluid py-5 text-center">
        {% if user.is_authenticated %}
            <h1 class="display-5 fw-bold text-success">登入成功！</h1>
            <p class="col-md-8 fs-4 mx-auto mt-3">
                太棒了，{{ user.username }}。你現在可以訪問會員專屬功能。
            </p>
            <hr class="my-4">
            <p>你的 Email 是：{{ user.email }}</p>
        {% else %}
            <h1 class="display-5 fw-bold">歡迎來到我們的系統</h1>
            <p class="col-md-8 fs-4 mx-auto mt-3">
                這是一個使用 Django 與 Allauth 構建的安全登入系統。
            </p>
            <div class="mt-4">
                <a href="{% url 'account_signup' %}" class="btn btn-primary btn-lg px-4">立即加入</a>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
